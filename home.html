<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" src="images/Witty Mart.png" alt="WittyMart Logo" type="image/x-icon">
    <title>Register / Login - WittyMart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo-container">
            <img src="images/Witty Mart.png" alt="WittyMart Logo">
            <h1>WittyMart</h1>
            <p>Smart Shopping for Witty Minds!</p>
        </div>

        <h2 id="formTitle"><i class="fas fa-user-plus"></i> Create Account</h2>

        <!-- Register Form -->
        <form id="signupForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" required placeholder="Enter username">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-user-circle"></i> Full Name</label>
                <div class="input-wrapper">
                    <input type="text" id="name" required placeholder="Enter full name">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Phone Number</label>
                <div class="input-wrapper">
                    <input type="tel" id="phone" required placeholder="Enter phone number">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" required placeholder="Enter email">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" required placeholder="Enter password">
                    <button type="button" class="toggle-password" id="togglePassword">Show</button>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" required placeholder="Confirm password">
                </div>
            </div>
            <button type="submit" class="btn-submit"><i class="fas fa-user-plus"></i> Register</button>
        </form>

        <!-- Login Form -->
        <form id="loginForm" class="hidden">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <div class="input-wrapper">
                    <input type="email" id="loginEmail" required placeholder="Enter email">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="input-wrapper">
                    <input type="password" id="loginPassword" required placeholder="Enter password">
                    <button type="button" class="toggle-password" id="toggleLoginPassword">Show</button>
                </div>
            </div>
            <button type="submit" class="btn-submit"><i class="fas fa-sign-in-alt"></i> Login</button>
        </form>

        <div class="progress-bar" id="progressBar"></div>
        <div id="message" class="message"></div>

        <div class="theme-toggle">
            <button id="themeToggleBtn"><i class="fas fa-moon"></i> Dark Mode</button>
        </div>

        <div class="switch-form">
            <button id="switchToLogin"><i class="fas fa-sign-in-alt"></i> Already have an account? Login</button>
            <button id="switchToRegister" class="hidden"><i class="fas fa-user-plus"></i> Don't have an account? Register</button>
        </div>
    </div>

    <!-- Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <p><i class="fas fa-check-circle"></i> Confirm Registration</p>
            <p>Are you sure you want to create this account?</p>
            <div class="modal-buttons">
                <button id="confirmBtn">Yes, Register</button>
                <button id="cancelBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const signupForm = document.getElementById('signupForm');
        const loginForm = document.getElementById('loginForm');
        const togglePassword = document.getElementById('togglePassword');
        const toggleLoginPassword = document.getElementById('toggleLoginPassword');
        const passwordInput = document.getElementById('password');
        const loginPasswordInput = document.getElementById('loginPassword');
        const message = document.getElementById('message');
        const modal = document.getElementById('confirmModal');
        const confirmBtn = document.getElementById('confirmBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const progressBar = document.getElementById('progressBar');
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const formTitle = document.getElementById('formTitle');
        const switchToLogin = document.getElementById('switchToLogin');
        const switchToRegister = document.getElementById('switchToRegister');

        // Theme
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const icon = themeToggleBtn.querySelector('i');
            if (theme === 'dark') {
                icon.className = 'fas fa-sun';
                themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i> Light Mode';
            } else {
                icon.className = 'fas fa-moon';
                themeToggleBtn.innerHTML = '<i class="fas fa-moon"></i> Dark Mode';
            }
        }

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        });

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            setTheme(savedTheme);
        });

        // Toggle password visibility
        togglePassword.addEventListener('click', () => {
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
            togglePassword.textContent = passwordInput.type === 'password' ? 'Show' : 'Hide';
        });

        toggleLoginPassword.addEventListener('click', () => {
            loginPasswordInput.type = loginPasswordInput.type === 'password' ? 'text' : 'password';
            toggleLoginPassword.textContent = loginPasswordInput.type === 'password' ? 'Show' : 'Hide';
        });

        // Register form submission
        signupForm.addEventListener('submit', e => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = passwordInput.value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();

            if (username.length < 3) return showMessage("Username must be at least 3 characters", 'error');
            if (!validateEmail(email)) return showMessage("Invalid email format", 'error');
            if (password.length < 6) return showMessage("Password must be at least 6 characters", 'error');
            if (password !== confirmPassword) return showMessage("Passwords do not match", 'error');

            modal.style.display = "block";
        });

        // Login form submission
        loginForm.addEventListener('submit', e => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = loginPasswordInput.value.trim();

            if (!validateEmail(email)) return showMessage("Invalid email format", 'error');
            if (password.length < 6) return showMessage("Password must be at least 6 characters", 'error');

            showMessage("Logging in...", "success");
            simulateProgressAndRedirect();
        });

        confirmBtn.addEventListener('click', () => {
            modal.style.display = "none";
            showMessage("Account created successfully!", "success");
            simulateProgressAndRedirect();
        });

        cancelBtn.addEventListener('click', () => {
            modal.style.display = "none";
        });

        function simulateProgressAndRedirect() {
            let width = 0;
            progressBar.style.width = '0';
            const interval = setInterval(() => {
                width += 20;
                progressBar.style.width = width + '%';
                if (width >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        window.location.href = "welcome.html";
                    }, 500);
                }
            }, 300);
        }

        function validateEmail(email) {
            return /^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(email.toLowerCase());
        }

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
            message.style.display = 'block';
            setTimeout(() => {
                message.style.display = 'none';
            }, 5000);
        }

        // Toggle between login and register forms
        switchToLogin.addEventListener('click', () => {
            signupForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            formTitle.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Your Account';
            switchToLogin.classList.add('hidden');
            switchToRegister.classList.remove('hidden');
            message.style.display = 'none';
        });

        switchToRegister.addEventListener('click', () => {
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            formTitle.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            switchToLogin.classList.remove('hidden');
            switchToRegister.classList.add('hidden');
            message.style.display = 'none';
        });

        // Close modal on outside click
        window.onclick = e => {
            if (e.target === modal) modal.style.display = "none";
        };

        // Enter key support for form switching
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const activeForm = document.querySelector('form:not(.hidden)');
                if (activeForm) {
                    activeForm.dispatchEvent(new Event('submit'));
                }
            }
        });
    </script>
</body>
</html>
