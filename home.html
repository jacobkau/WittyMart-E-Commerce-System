<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register / Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    :root {
      --bg-color: #f4f4f4;
      --text-color: #000;
      --container-bg: #fff;
      --button-bg: #3498db;
      --modal-bg: #fff;
      --shadow-color: #ccc;
    }

    [data-theme="dark"] {
      --bg-color: #1e1e1e;
      --text-color: #fff;
      --container-bg: #2c2c2c;
      --button-bg: #2980b9;
      --modal-bg: #333;
      --shadow-color: #000;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
    }

    .container {
      max-width: 400px;
      background: var(--container-bg);
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px var(--shadow-color);
      margin: auto;
    }

    h2 {
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      box-sizing: border-box;
      background: none;
      color: inherit;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      background-color: var(--button-bg);
      color: white;
      border: none;
      cursor: pointer;
    }

    .toggle-password {
      cursor: pointer;
      font-size: 12px;
      float: right;
      margin-top: -30px;
      margin-right: 10px;
      position: relative;
      z-index: 2;
    }

    .message {
      margin-top: 10px;
      font-weight: bold;
    }

    .error { color: red; }
    .success { color: green; }

    .progress-bar {
      width: 0;
      height: 10px;
      background: var(--button-bg);
      transition: width 1s ease-in-out;
      border-radius: 5px;
      margin-top: 10px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 10;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.4);
    }

    .modal-content {
      background: var(--modal-bg);
      margin: 15% auto;
      padding: 20px;
      max-width: 300px;
      border-radius: 10px;
      text-align: center;
      color: var(--text-color);
    }

    .modal button {
      width: 45%;
      margin: 5px;
    }

    .theme-toggle, .switch-form {
      text-align: center;
      margin-top: 10px;
    }

    .theme-toggle button, .switch-form button {
      width: auto;
      background: var(--button-bg);
      color: #fff;
      border: none;
      padding: 5px 15px;
      margin: 5px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="formTitle">Create your own Account with us!</h2>

    <!-- Register Form -->
    <form id="signupForm">
      <label>Username:</label>
      <input type="text" id="username" required placeholder="Enter username">

      <label>Full Name:</label>
      <input type="text" id="name" required placeholder="Enter full name">

      <label>Phone Number:</label>
      <input type="tel" id="phone" required placeholder="Enter phone number">

      <label>Email:</label>
      <input type="email" id="email" required placeholder="Enter email">

      <label>Password:</label>
      <input type="password" id="password" required placeholder="Enter password">
      <span class="toggle-password" id="togglePassword">Show</span>

      <label>Confirm Password:</label>
      <input type="password" id="confirmPassword" required placeholder="Confirm password">

      <button type="submit">Register</button>
    </form>

    <!-- Login Form -->
    <form id="loginForm" class="hidden">
      <label>Email:</label>
      <input type="email" id="loginEmail" required placeholder="Enter email">

      <label>Password:</label>
      <input type="password" id="loginPassword" required placeholder="Enter password">
      <span class="toggle-password" id="toggleLoginPassword">Show</span>

      <button type="submit">Login</button>
    </form>

    <div class="progress-bar" id="progressBar"></div>
    <div id="message" class="message"></div>

    <div class="theme-toggle">
      <button id="themeToggleBtn"><i class="fa fa-moon"></i></button>
    </div>

    <div class="switch-form">
      <button id="switchToLogin">Already have an account? Login</button>
      <button id="switchToRegister" class="hidden">Don't have an account? Register</button>
    </div>
  </div>

  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <p>Are you sure you want to submit?</p>
      <button id="confirmBtn">Yes</button>
      <button id="cancelBtn">Cancel</button>
    </div>
  </div>

  <script>
    const signupForm = document.getElementById('signupForm');
    const loginForm = document.getElementById('loginForm');
    const togglePassword = document.getElementById('togglePassword');
    const toggleLoginPassword = document.getElementById('toggleLoginPassword');
    const passwordInput = document.getElementById('password');
    const loginPasswordInput = document.getElementById('loginPassword');
    const message = document.getElementById('message');
    const modal = document.getElementById('confirmModal');
    const confirmBtn = document.getElementById('confirmBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const progressBar = document.getElementById('progressBar');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const formTitle = document.getElementById('formTitle');
    const switchToLogin = document.getElementById('switchToLogin');
    const switchToRegister = document.getElementById('switchToRegister');

    // Theme
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
    }

    themeToggleBtn.addEventListener('click', () => {
      const newTheme = localStorage.getItem('theme') === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
    });

    window.addEventListener('DOMContentLoaded', () => {
      const savedTheme = localStorage.getItem('theme') || 'light';
      setTheme(savedTheme);
    });

    // Toggle password visibility
    togglePassword.addEventListener('click', () => {
      passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
      togglePassword.textContent = passwordInput.type === 'password' ? 'Show' : 'Hide';
    });

    toggleLoginPassword.addEventListener('click', () => {
      loginPasswordInput.type = loginPasswordInput.type === 'password' ? 'text' : 'password';
      toggleLoginPassword.textContent = loginPasswordInput.type === 'password' ? 'Show' : 'Hide';
    });

    // Register form submission
    signupForm.addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = passwordInput.value.trim();

      if (username.length < 3) return showMessage("Username must be at least 3 characters", 'error');
      if (!validateEmail(email)) return showMessage("Invalid email format", 'error');
      if (password.length < 6) return showMessage("Password must be at least 6 characters", 'error');

      modal.style.display = "block";
    });

    // Login form submission
    loginForm.addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = loginPasswordInput.value.trim();

      if (!validateEmail(email)) return showMessage("Invalid email format", 'error');
      if (password.length < 6) return showMessage("Password must be at least 6 characters", 'error');

      showMessage("Logging in...", "success");
      simulateProgressAndRedirect();
    });

    confirmBtn.addEventListener('click', () => {
      modal.style.display = "none";
      simulateProgressAndRedirect();
    });

    cancelBtn.addEventListener('click', () => modal.style.display = "none");

    function simulateProgressAndRedirect() {
      let width = 0;
      progressBar.style.width = '0';
      const interval = setInterval(() => {
        width += 20;
        progressBar.style.width = width + '%';
        if (width >= 100) {
          clearInterval(interval);
          setTimeout(() => {
            window.location.href = "welcome.html";
          }, 500);
        }
      }, 300);
    }

    function validateEmail(email) {
      return /^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(email.toLowerCase());
    }

    function showMessage(text, type) {
      message.textContent = text;
      message.className = `message ${type}`;
    }

    // Toggle between login and register forms
    switchToLogin.addEventListener('click', () => {
      signupForm.classList.add('hidden');
      loginForm.classList.remove('hidden');
      formTitle.textContent = "Login to your Account";
      switchToLogin.classList.add('hidden');
      switchToRegister.classList.remove('hidden');
      message.textContent = '';
    });

    switchToRegister.addEventListener('click', () => {
      signupForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
      formTitle.textContent = "Create your own Account with us!";
      switchToLogin.classList.remove('hidden');
      switchToRegister.classList.add('hidden');
      message.textContent = '';
    });

    // Close modal on outside click
    window.onclick = e => {
      if (e.target === modal) modal.style.display = "none";
    };
  </script>
</body>
</html>
