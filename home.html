<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register / Login - WittyMart</title>    
    <link rel="icon" src="images/Witty Mart.png" alt="WittyMart Logo" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-color: #f5f5f5;
            --text-color: #333;
            --container-bg: #fff;
            --button-bg: #ff6738;
            --button-hover: #e55a2b;
            --modal-bg: #fff;
            --shadow-color: rgba(0,0,0,0.1);
            --border-color: #e0e0e0;
            --input-bg: #f9f9f9;
            --label-color: #555;
        }
        [data-theme="dark"] {
            --bg-color: #1a1a2e;
            --text-color: #fff;
            --container-bg: #2c2c3e;
            --button-bg: #ff6738;
            --button-hover: #e55a2b;
            --modal-bg: #2c2c3e;
            --shadow-color: rgba(0,0,0,0.3);
            --border-color: rgba(255,255,255,0.1);
            --input-bg: rgba(255,255,255,0.05);
            --label-color: rgba(255,255,255,0.8);
        }
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s ease, color 0.3s ease;
            padding: 20px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: var(--container-bg);
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px var(--shadow-color);
            transition: background 0.3s ease;
            border: 1px solid var(--border-color);
        }
        .logo-container {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo-container img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
        }
        .logo-container h1 {
            font-size: 1.5rem;
            color: #ff6738;
        }
        .logo-container p {
            color: var(--label-color);
            font-size: 0.9rem;
        }
        h2 {
            text-align: center;
            font-size: 1.5rem;
            color: var(--text-color);
            margin-bottom: 20px;
        }
        h2 i {
            color: #ff6738;
            margin-right: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--label-color);
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .form-group label i {
            color: #ff6738;
            margin-right: 8px;
            width: 18px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper input {
            width: 100%;
            padding: 12px 15px;
            background: var(--input-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }
        .input-wrapper input:focus {
            border-color: #ff6738;
            box-shadow: 0 0 0 3px rgba(255,103,56,0.1);
        }
        .input-wrapper input::placeholder {
            color: #aaa;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: none;
            border: none;
        }
        .toggle-password:hover {
            color: #ff6738;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--button-bg);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background: var(--button-hover);
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255,103,56,0.3);
        }
        .btn-submit i {
            margin-right: 8px;
        }
        .progress-bar {
            width: 0;
            height: 6px;
            background: #ff6738;
            transition: width 1s ease-in-out;
            border-radius: 3px;
            margin-top: 15px;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
            text-align: center;
            display: none;
        }
        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .theme-toggle {
            text-align: center;
            margin-top: 20px;
        }
        .theme-toggle button {
            padding: 8px 20px;
            background: var(--button-bg);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        .theme-toggle button:hover {
            background: var(--button-hover);
            transform: scale(1.02);
        }
        .theme-toggle button i {
            margin-right: 8px;
        }
        .switch-form {
            text-align: center;
            margin-top: 15px;
        }
        .switch-form button {
            background: none;
            border: none;
            color: #ff6738;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            padding: 5px 10px;
        }
        .switch-form button:hover {
            text-decoration: underline;
        }
        .hidden {
            display: none !important;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: var(--modal-bg);
            margin: 20% auto;
            padding: 30px;
            max-width: 350px;
            border-radius: 12px;
            text-align: center;
            color: var(--text-color);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
        }
        .modal-content p {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        .modal-content p i {
            color: #ff6738;
            font-size: 30px;
            display: block;
            margin-bottom: 10px;
        }
        .modal-content .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .modal-content button {
            padding: 10px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }
        .modal-content #confirmBtn {
            background: #ff6738;
            color: #fff;
        }
        .modal-content #confirmBtn:hover {
            background: #e55a2b;
            transform: scale(1.02);
        }
        .modal-content #cancelBtn {
            background: #e0e0e0;
            color: #333;
        }
        .modal-content #cancelBtn:hover {
            background: #ccc;
        }
        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            .logo-container h1 {
                font-size: 1.2rem;
            }
            h2 {
                font-size: 1.2rem;
            }
            .input-wrapper input {
                padding: 10px 12px;
                font-size: 0.95rem;
            }
            .btn-submit {
                padding: 12px;
                font-size: 0.95rem;
            }
            .modal-content {
                margin: 30% auto;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo-container">
            <img src="images/Witty Mart.png" alt="WittyMart Logo">
            <h1>WittyMart</h1>
            <p>Smart Shopping for Witty Minds!</p>
        </div>

        <h2 id="formTitle"><i class="fas fa-user-plus"></i> Create Account</h2>

        <!-- Register Form -->
        <form id="signupForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" required placeholder="Enter username">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-user-circle"></i> Full Name</label>
                <div class="input-wrapper">
                    <input type="text" id="name" required placeholder="Enter full name">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Phone Number</label>
                <div class="input-wrapper">
                    <input type="tel" id="phone" required placeholder="Enter phone number">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" required placeholder="Enter email">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" required placeholder="Enter password">
                    <button type="button" class="toggle-password" id="togglePassword">Show</button>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" required placeholder="Confirm password">
                </div>
            </div>
            <button type="submit" class="btn-submit"><i class="fas fa-user-plus"></i> Register</button>
        </form>

        <!-- Login Form -->
        <form id="loginForm" class="hidden">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <div class="input-wrapper">
                    <input type="email" id="loginEmail" required placeholder="Enter email">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="input-wrapper">
                    <input type="password" id="loginPassword" required placeholder="Enter password">
                    <button type="button" class="toggle-password" id="toggleLoginPassword">Show</button>
                </div>
            </div>
            <button type="submit" class="btn-submit"><i class="fas fa-sign-in-alt"></i> Login</button>
        </form>

        <div class="progress-bar" id="progressBar"></div>
        <div id="message" class="message"></div>

        <div class="theme-toggle">
            <button id="themeToggleBtn"><i class="fas fa-moon"></i> Dark Mode</button>
        </div>

        <div class="switch-form">
            <button id="switchToLogin"><i class="fas fa-sign-in-alt"></i> Already have an account? Login</button>
            <button id="switchToRegister" class="hidden"><i class="fas fa-user-plus"></i> Don't have an account? Register</button>
        </div>
    </div>

    <!-- Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <p><i class="fas fa-check-circle"></i> Confirm Registration</p>
            <p>Are you sure you want to create this account?</p>
            <div class="modal-buttons">
                <button id="confirmBtn">Yes, Register</button>
                <button id="cancelBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const signupForm = document.getElementById('signupForm');
        const loginForm = document.getElementById('loginForm');
        const togglePassword = document.getElementById('togglePassword');
        const toggleLoginPassword = document.getElementById('toggleLoginPassword');
        const passwordInput = document.getElementById('password');
        const loginPasswordInput = document.getElementById('loginPassword');
        const message = document.getElementById('message');
        const modal = document.getElementById('confirmModal');
        const confirmBtn = document.getElementById('confirmBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const progressBar = document.getElementById('progressBar');
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const formTitle = document.getElementById('formTitle');
        const switchToLogin = document.getElementById('switchToLogin');
        const switchToRegister = document.getElementById('switchToRegister');

        // Theme
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const icon = themeToggleBtn.querySelector('i');
            if (theme === 'dark') {
                icon.className = 'fas fa-sun';
                themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i> Light Mode';
            } else {
                icon.className = 'fas fa-moon';
                themeToggleBtn.innerHTML = '<i class="fas fa-moon"></i> Dark Mode';
            }
        }

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        });

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            setTheme(savedTheme);
        });

        // Toggle password visibility
        togglePassword.addEventListener('click', () => {
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
            togglePassword.textContent = passwordInput.type === 'password' ? 'Show' : 'Hide';
        });

        toggleLoginPassword.addEventListener('click', () => {
            loginPasswordInput.type = loginPasswordInput.type === 'password' ? 'text' : 'password';
            toggleLoginPassword.textContent = loginPasswordInput.type === 'password' ? 'Show' : 'Hide';
        });

        // Register form submission
        signupForm.addEventListener('submit', e => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = passwordInput.value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();

            if (username.length < 3) return showMessage("Username must be at least 3 characters", 'error');
            if (!validateEmail(email)) return showMessage("Invalid email format", 'error');
            if (password.length < 6) return showMessage("Password must be at least 6 characters", 'error');
            if (password !== confirmPassword) return showMessage("Passwords do not match", 'error');

            modal.style.display = "block";
        });

        // Login form submission
        loginForm.addEventListener('submit', e => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = loginPasswordInput.value.trim();

            if (!validateEmail(email)) return showMessage("Invalid email format", 'error');
            if (password.length < 6) return showMessage("Password must be at least 6 characters", 'error');

            showMessage("Logging in...", "success");
            simulateProgressAndRedirect();
        });

        confirmBtn.addEventListener('click', () => {
            modal.style.display = "none";
            showMessage("Account created successfully!", "success");
            simulateProgressAndRedirect();
        });

        cancelBtn.addEventListener('click', () => {
            modal.style.display = "none";
        });

        function simulateProgressAndRedirect() {
            let width = 0;
            progressBar.style.width = '0';
            const interval = setInterval(() => {
                width += 20;
                progressBar.style.width = width + '%';
                if (width >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        window.location.href = "welcome.html";
                    }, 500);
                }
            }, 300);
        }

        function validateEmail(email) {
            return /^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(email.toLowerCase());
        }

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
            message.style.display = 'block';
            setTimeout(() => {
                message.style.display = 'none';
            }, 5000);
        }

        // Toggle between login and register forms
        switchToLogin.addEventListener('click', () => {
            signupForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            formTitle.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Your Account';
            switchToLogin.classList.add('hidden');
            switchToRegister.classList.remove('hidden');
            message.style.display = 'none';
        });

        switchToRegister.addEventListener('click', () => {
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            formTitle.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            switchToLogin.classList.remove('hidden');
            switchToRegister.classList.add('hidden');
            message.style.display = 'none';
        });

        // Close modal on outside click
        window.onclick = e => {
            if (e.target === modal) modal.style.display = "none";
        };

        // Enter key support for form switching
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const activeForm = document.querySelector('form:not(.hidden)');
                if (activeForm) {
                    activeForm.dispatchEvent(new Event('submit'));
                }
            }
        });
    </script>
</body>
</html>
